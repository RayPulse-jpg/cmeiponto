<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Gerador de Folha de Ponto CMEI</title>

    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.1/firebase-auth-compat.js"></script>

    <link rel="stylesheet" href="style.css?v=3">
</head>

<body>
    <div id="tela-login" class="hidden">
        <div class="login-wrapper">
            <div class="login-box">
                <!-- COLUNA ESQUERDA: ILUSTRAÇÃO -->
                <div class="login-info">
                    <img src="login_illustration.png" alt="Ilustração Tecnologia" class="login-illustration">
                    <h2>Bem-vindo de Volta!</h2>
                    <p>Acesse o painel para gerenciar a folha de ponto com facilidade e rapidez.</p>
                </div>
                <!-- COLUNA DIREITA: FORMULÁRIO -->
                <div class="login-form-area">
                    <div class="login-logo-mobile">CMEI Maria Jandira</div>
                    <h3>Faça seu Login</h3>
                    <p class="login-subtitle">Acesso Restrito à Secretaria</p>
                    <input type="email" id="login-email" placeholder="E-mail de acesso">
                    <input type="password" id="login-senha" placeholder="Senha">
                    <button class="btn-login-gradient">Entrar no Sistema</button>
                    <div id="mensagem-erro" aria-live="polite">Usuário ou senha incorretos.</div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
